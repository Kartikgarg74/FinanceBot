version: '3.8'

services:
  financebot:
    build: .
    container_name: financebot
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    command: ["python", "main.py", "--market", "all"]
    healthcheck:
      test: ["CMD", "python", "-c", "import src.finance.health as h; status = h.get_health_monitor().get_summary(); exit(0 if 'healthy' in status.lower() or 'no apis' in status.lower() else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp:size=100M
